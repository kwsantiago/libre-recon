# garbageman stealth config. The source-level stealth (getdata-pigeon removal,
# peering hardening, feefilter=100, libre-relay bit-29 signalling) is baked into
# the garbageman-29.3-battle branch this image builds; this file adds the runtime
# knobs.

server=1
listen=1
# Occupy libre-relay slots: accept inbound so LR nodes can dial you.
maxconnections=125

# Spoof the user agent to a plain /Satoshi:.../ with no "Knots" tag, which
# defeats the subversion-substring banlists.
uaspoof=1

# Do NOT set corepolicy: it switches to Core policy and disables the datacarrier
# filtering that is the entire purpose of a garbageman node.

# RPC is container-local only.
rpcbind=127.0.0.1
rpcallowip=127.0.0.1
